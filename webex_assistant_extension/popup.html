<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polimi Webex Assistant</title>
    <style>
        :root {
            --primary: #1a73e8;
            --primary-hover: #1e45b2;
            --accent: #3ad779;

            --bg-main: #f9f9fb;
            --bg-element: #fff;
            --bg-link: #f1f1f1;
            --bg-toggle: #ccc;

            --text-primary: #333;
            --text-secondary: #666;
            --text-dark: #222;
            --text-light: #555;
            --text-button: white;

            --border-light: #eee;
            --border-medium: #ccc;
            --border-dark: #d1d1d1;

            --shadow: rgba(0, 0, 0, 0.1);
            --toggle-knob: white;
        }

        /* === DARK MODE POPUP === */
        body.dark {
            --primary: #5a9cf8;
            --primary-hover: #7ab4ff;
            --accent: #3ad779;

            --bg-main: #1a1a1e;
            --bg-element: #26262c;
            --bg-link: #2e2e36;
            --bg-toggle: #555;

            --text-primary: #e0e0e0;
            --text-secondary: #aaa;
            --text-dark: #f0f0f0;
            --text-light: #bbb;
            --text-button: white;

            --border-light: #3a3a44;
            --border-medium: #555;
            --border-dark: #444;

            --shadow: rgba(0, 0, 0, 0.4);
            --toggle-knob: white;
        }

        body.dark #student-email {
            background-color: #1e1e24;
            color: #e0e0e0;
            border-color: var(--border-medium);
        }

        body.dark #student-email::placeholder {
            color: #777;
        }

        body {
            width: 320px;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: var(--bg-main);
            color: var(--text-primary);
            margin: 0;
            box-sizing: border-box;
        }

        h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 16px;
            color: var(--primary);
        }

        .section {
            background: var(--bg-element);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 1px 3px var(--shadow);
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: left;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title--no-border {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .slider-container {
            margin: 10px 0;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .speed-display {
            font-size: 24px;
            font-weight: bold;
            color: var(--text-dark);
            margin-bottom: 5px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        button {
            background-color: var(--primary);
            color: var(--text-button);
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background-color 0.2s;
            width: 100%;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider-toggle {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--bg-toggle);
            transition: .4s;
            border-radius: 20px;
        }

        .slider-toggle:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: var(--text-button);
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider-toggle {
            background-color: var(--primary);
        }

        input:checked+.slider-toggle:before {
            transform: translateX(14px);
        }

        .param-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-top: 8px;
        }

        .param-row span.val {
            font-weight: bold;
            color: var(--primary);
        }
    </style>
</head>

<body>
    <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 15px;">
        <img src="icons/icon48.png" alt="Polimi Webex Assistant Logo"
            style="width: 24px; height: 24px; margin-right: 8px; border-radius: 4px;">
        <h3 style="margin: 0;">Polimi Webex Assistant</h3>
    </div>

    <div class="section">
        <div class="section-title">Login Automatico</div>
        <div class="param-row">
            <span>Email Webex</span>
        </div>
        <div class="slider-container" style="margin-top: 5px;">
            <input type="email" id="student-email" placeholder="nome@mail.polimi.it"
                style="width: 100%; box-sizing: border-box; padding: 6px; border: 1px solid var(--border-medium); border-radius: 4px;">
        </div>
    </div>

    <div class="section">
        <div class="section-title">Velocità di Riproduzione</div>
        <div class="speed-display" id="speed-label">1.00x</div>
        <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">
            Tempo rimanente: <strong id="remaining-time-label" style="color: var(--accent);">--:--:--</strong>
        </div>

        <div class="param-row" style="margin-bottom: 15px;">
            <span>Mostra nel Player</span>
            <label class="switch">
                <input type="checkbox" id="remaining-time-toggle">
                <span class="slider-toggle"></span>
            </label>
        </div>

        <div class="slider-container">
            <input type="range" id="speed-slider" min="0.25" max="10" step="0.25" value="1">
            <div class="controls">
                <span>0.25x</span>
                <span>10x</span>
            </div>
        </div>
        <button id="reset-btn">Reset a 1.00x</button>
    </div>

    <div class="section">
        <div class="section-title">
            Skip dei Silenzi
            <label class="switch">
                <input type="checkbox" id="silence-toggle">
                <span class="slider-toggle"></span>
            </label>
        </div>

        <div class="param-row">
            <span>Soglia Volume</span>
            <span class="val" id="threshold-label">2.0%</span>
        </div>
        <div class="slider-container">
            <input type="range" id="threshold-slider" min="0" max="20" step="0.1" value="2.0">
        </div>

        <div class="param-row">
            <span>Ritardo Skip</span>
            <span class="val" id="duration-label">1.0s</span>
        </div>
        <div class="slider-container">
            <input type="range" id="duration-slider" min="0" max="3" step="0.1" value="1.0">
        </div>

        <div class="param-row">
            <span>Velocità di Skip</span>
            <span class="val" id="skip-speed-label">8.00x</span>
        </div>
        <div class="slider-container">
            <input type="range" id="skip-speed-slider" min="2" max="16" step="0.5" value="8">
        </div>
    </div>

    <div class="section">
        <div class="section-title section-title--no-border">
            Modalità Scura
            <label class="switch">
                <input type="checkbox" id="dark-mode-toggle">
                <span class="slider-toggle"></span>
            </label>
        </div>
    </div>

    <a href="https://github.com/lorenzovitale1/webex_assistant/issues" target="_blank"
        style="display: block; width: 100%; box-sizing: border-box; text-decoration: none; background-color: var(--bg-link); color: var(--text-light); padding: 10px; border-radius: 4px; font-size: 13px; font-weight: 500; border: 1px solid var(--border-dark); transition: background-color 0.2s;">
        🐛 Segnala un Problema/Bug
    </a>

    <script src="popup.js"></script>
    <!-- Script inline: applica tema scuro al body PRIMA del rendering per evitare flash -->
    <script>
        chrome.storage.local.get(['config'], function(result) {
            if (result.config && result.config.darkMode) {
                document.body.classList.add('dark');
            }
        });
    </script>
</body>

</html>
